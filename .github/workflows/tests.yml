name: Tests

on:
  push:
  pull_request:
  release:

jobs:
  ci-guardrails:
    name: CI guardrails
    runs-on: ubuntu-22.04
    steps:

    - uses: actions/checkout@v4
      with:
          submodules: true
          fetch-depth: 0

    - name: Run actionlint
      run: |
        mkdir -p "$RUNNER_TEMP/bin"
        curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- -b "$RUNNER_TEMP/bin"
        "$RUNNER_TEMP/bin/actionlint" -color

    - name: Validate CI workflow contracts
      run: python3 ci/check_ci_contracts.py

    - name: Validate CI helper script syntax
      run: bash -n ci/verify_linux_bundle.sh
  qt6:
    name: Build with Qt 6
    runs-on: ubuntu-22.04
    steps:

    - uses: actions/checkout@v4
      with:
          submodules: true
          fetch-depth: 0

    - name: Install Nix
      uses: cachix/install-nix-action@v27
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Restore and save Nix store cache
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.nix', 'flake.lock') }}
        restore-prefixes-first-match: |
          nix-${{ runner.os }}-${{ runner.arch }}-
          nix-${{ runner.os }}-
        gc-max-store-size-linux: 6G

    - name: Show Nix info
      run: nix --version

    - name: Build (Nix)
      timeout-minutes: 20
      run: nix build .#

    - name: Configure, build, and test (Nix dev shell)
      timeout-minutes: 20
      run: |
        nix develop -c bash -lc "
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo &&
          cmake --build build --verbose &&
          cmake --install build --prefix /tmp/staging &&
          ctest --test-dir build --output-on-failure
        "
