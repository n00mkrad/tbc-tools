name: "Build Windows tools"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CACHE_REPOSITORY: "harrypm/tbc-tools-ci-cache"
  CACHE_REPOSITORY_REF: "main"
  ONNXRUNTIME_VERSION: "1.18.1"
  # External tools to be bundled
  FFMPEG_FILE: "ffmpeg-8.0.1-full_build.zip"
  FFMPEG_PATH: "ffmpeg-8.0.1-full_build"
  FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/8.0.1/ffmpeg-8.0.1-full_build.zip"
  FLAC_FILE: "flac-1.5.0-win.zip"
  FLAC_PATH: "flac-1.5.0-win"
  FLAC_URL: "https://ftp.osuosl.org/pub/xiph/releases/flac/flac-1.5.0-win.zip"
  VCPKG_COMMIT: "d30fdf55cfca16e12bc3ad99cbc615997014b61b"
  # Persist vcpkg binary artifacts across runs for faster Windows builds.
  VCPKG_BINARY_CACHE_ROOT: "${{ github.workspace }}\\external-cache\\vcpkg"

jobs:
  build-tbc-tools:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: windows-2022
            vcpkg_triplet: x64-windows
            configure_preset: vcpkg
            build_preset: vcpkg
            cache_subdir: windows-x64
            artifact_name: tbc-tools_windows_x86_64
            bundle_external_tools: true
          - arch: arm64
            runs_on: windows-11-arm
            vcpkg_triplet: arm64-windows
            configure_preset: vcpkg-arm64
            build_preset: vcpkg-arm64
            cache_subdir: windows-arm64
            artifact_name: tbc-tools_windows_arm64
            bundle_external_tools: true
    name: Build tbc-tools (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true
          ref: ${{ inputs.checkout_ref || github.ref }}
      - name: Checkout dedicated cache repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CACHE_REPOSITORY }}
          ref: ${{ env.CACHE_REPOSITORY_REF }}
          path: external-cache
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            src/tbc-video-export/pyinstaller/requirements-build-windows.txt
      - name: Download ONNX Runtime package
        shell: pwsh
        run: |
          $version = "${{ env.ONNXRUNTIME_VERSION }}"
          if ("${{ matrix.arch }}" -eq "x86_64") {
            $onnxFile = "onnxruntime-win-x64-gpu-$version.zip"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            $onnxFile = "onnxruntime-win-arm64-$version.zip"
          } else {
            throw "Unsupported Windows architecture '${{ matrix.arch }}' for ONNX Runtime package selection."
          }

          $downloadUrl = "https://github.com/microsoft/onnxruntime/releases/download/v$version/$onnxFile"
          $extractRoot = Join-Path "${{ github.workspace }}" "external\\onnxruntime"
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null

          $archivePath = Join-Path $extractRoot $onnxFile
          Invoke-WebRequest $downloadUrl -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force

          $onnxRoot = Join-Path $extractRoot ($onnxFile -replace '\.zip$','')
          if (-not (Test-Path "$onnxRoot\\include\\onnxruntime_cxx_api.h")) {
            throw "ONNX Runtime headers not found in $onnxRoot\\include"
          }
          if (-not (Test-Path "$onnxRoot\\lib\\onnxruntime.lib")) {
            throw "ONNX Runtime import library not found in $onnxRoot\\lib"
          }

          "ONNXRUNTIME_ROOT=$onnxRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.6" # Need to pin to CMake 3.x until fftw3 is updated to support CMake 4.x.
      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_ROOT }}\\${{ matrix.cache_subdir }}
          key: ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-binary-cache-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('**/vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-binary-cache-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}-
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-binary-cache-${{ env.VCPKG_COMMIT }}-
            ${{ runner.os }}-${{ matrix.vcpkg_triplet }}-vcpkg-binary-cache-

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path ".\\vcpkg\\.git")) {
            git clone https://github.com/microsoft/vcpkg.git vcpkg
          }
          Push-Location .\\vcpkg
          git fetch --tags --force
          git checkout "${{ env.VCPKG_COMMIT }}"
          Pop-Location
          .\\vcpkg\\bootstrap-vcpkg.bat -disableMetrics
          "VCPKG_ROOT=${{ github.workspace }}\\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RUNVCPKG_VCPKG_ROOT=${{ github.workspace }}\\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Initialize dedicated repository vcpkg cache
        run: |
          $cachePath = "${{ env.VCPKG_BINARY_CACHE_ROOT }}\${{ matrix.cache_subdir }}"
          New-Item -ItemType Directory -Force -Path $cachePath | Out-Null
          "VCPKG_BINARY_SOURCES=clear;files,$cachePath,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Reassemble chunked repository cache archives
        run: |
          $cacheRoot = "${{ env.VCPKG_BINARY_CACHE_ROOT }}\${{ matrix.cache_subdir }}"
          Get-ChildItem -Recurse -Path $cacheRoot -Filter "*.zip.part.001" | ForEach-Object {
            $zipPath = $_.FullName -replace '\.part\.001$',''
            if (Test-Path $zipPath) {
              return
            }
            $parts = Get-ChildItem -Path "$zipPath.part.*" | Sort-Object Name
            if ($parts.Count -eq 0) {
              return
            }
            cmd /c "copy /b `"$zipPath.part.*`" `"$zipPath`" >nul"
          }

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.configure_preset }}
          configurePresetAdditionalArgs: "['-DCMAKE_BUILD_TYPE=Release', '-DUSE_QT_VERSION=6', '-DBUILD_PYTHON=false', '-DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}', '-DVCPKG_APPLOCAL_DEPS=ON', '-DBUILD_TESTING=OFF',]"
          buildPreset: ${{ matrix.build_preset }}
          buildPresetAdditionalArgs: "['--config Release']"
          # Prevent false-positive "File not found" warnings from broad default log regexes.
          logCollectionRegExps: "a^"

      - name: Create release directory
        run: New-Item -ItemType Directory -Path release

      - name: Copy binaries to release directory
        run: Get-ChildItem -Recurse -Path build\\bin\\* -Include *.exe, *.dll | Copy-Item -Destination release\\
      - name: Copy AAA (Auto Audio Align) vendor payload to release directory
        # The "Copy binaries" step flattens *.exe/*.dll to the release root, which
        # breaks the AAA resolver path (<appDir>\vendor\vhs_decode_auto_audio_align\)
        # that audioalignmentutil.cpp expects for ld-analyse/tbc-audio-align.
        # Restore the vendored VhsDecodeAutoAudioAlign.exe + Binah.dll under their
        # resolver-expected subdir so the AAA feature works in the Windows release.
        run: |
          $vendorSrc = "build\\bin\\vendor\\vhs_decode_auto_audio_align"
          $vendorDst = "release\\vendor\\vhs_decode_auto_audio_align"
          if (-not (Test-Path "$vendorSrc\\VhsDecodeAutoAudioAlign.exe") -or -not (Test-Path "$vendorSrc\\Binah.dll")) {
            throw "AAA vendor payload missing under $vendorSrc"
          }
          New-Item -ItemType Directory -Force -Path $vendorDst | Out-Null
          Copy-Item -Path "$vendorSrc\\*" -Destination $vendorDst -Recurse -Force
          Write-Host "Bundled AAA vendor payload to $vendorDst"
      - name: Copy ONNX Runtime DLLs to release directory
        run: |
          $onnxLibDir = "$env:ONNXRUNTIME_ROOT\\lib"
          if (-not (Test-Path "$onnxLibDir\\onnxruntime.dll")) {
            throw "onnxruntime.dll not found at $onnxLibDir\\onnxruntime.dll"
          }
          Copy-Item -Path "$onnxLibDir\\onnxruntime.dll" -Destination release\\
          if ("${{ matrix.arch }}" -eq "x86_64") {
            Get-ChildItem -Path $onnxLibDir -Filter "onnxruntime_providers_*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination release\\
          }

      - name: Copy Qt plugins to release directory
        run: Copy-Item -Recurse -Exclude *.pdb -Path build\\vcpkg_installed\\${{ matrix.vcpkg_triplet }}\\Qt6\\plugins\\* -Destination release\\

      - name: Write qt.conf for Qt plugin discovery
        run: |
          # The Windows release lays Qt plugins out flat (release\\<category>\\*.dll,
          # e.g. release\\platforms\\qwindows.dll). Without a qt.conf Qt falls back to
          # its compiled-in vcpkg prefix, which does not exist on end-user machines,
          # and the platform plugin is not found -> "no Qt platform plugin could be
          # initialized" (the classic Windows "missing DLL" startup failure).
          # macOS writes an equivalent qt.conf (Plugins = PlugIns); mirror that here.
          Set-Content -Path release\\qt.conf -Encoding ASCII -Value "[Paths]"
          Add-Content -Path release\\qt.conf -Encoding ASCII -Value "Prefix = ."
          Add-Content -Path release\\qt.conf -Encoding ASCII -Value "Plugins = ."

      - name: Copy MSVC runtime DLLs to release directory
        run: |
          # The executables dynamically import VCRUNTIME140.dll / VCRUNTIME140_1.dll
          # (and lddecode-linked code uses MSVCP140.dll) but vcpkg does not redistribute
          # the CRT next to the binaries, so a clean Windows machine without the VC++
          # redistributable gets "VCRUNTIME140.dll was not found". Copy the redist DLLs
          # from the installed VS 2022 toolchain on the runner.
          $archDir = if ("${{ matrix.arch }}" -eq "x86_64") { "x64" } elseif ("${{ matrix.arch }}" -eq "arm64") { "arm64" } else { "" }
          if ([string]::IsNullOrWhiteSpace($archDir)) { throw "Unsupported arch '${{ matrix.arch }}' for MSVC CRT lookup" }
          $redistRoots = @("C:\Program Files\Microsoft Visual Studio\2022", "C:\Program Files (x86)\Microsoft Visual Studio\2022")
          $crtDir = $null
          # Collect every vcruntime140.dll under the VS 2022 install for this arch. The
          # windows-2022 runner ships BOTH the VS 2019 (VC142, 14.29) and VS 2022 (VC143)
          # redistributables; the previous "Select-Object -First 1" grabbed whichever the
          # recursive enumeration hit first, which was the older VC142 CRT. Bundling the
          # VC142 MSVCP140.dll / vcruntime140*.dll with VC143-built binaries is an ABI
          # mismatch that crashes the GUI executables at startup (STATUS_DLL_INIT_FAILED
          # 0xC0000142, access violation inside MSVCP140.dll). Prefer the desktop (non-
          # onecore) VS 2022 (VC143) CRT with the highest version, which matches the build.
          $candidates = @()
          foreach ($root in $redistRoots) {
            if (-not (Test-Path $root)) { continue }
            $candidates += Get-ChildItem -Path $root -Recurse -ErrorAction SilentlyContinue -Filter "vcruntime140.dll" |
              Where-Object { $_.FullName -match "\\$archDir\\Microsoft\.VC[0-9]+\.CRT\\" }
          }
          if ($candidates.Count -eq 0) { throw "MSVC CRT directory not found under VS 2022 redist for arch $archDir" }
          $hit = $candidates | Where-Object { $_.FullName -match 'Microsoft\.VC143\.CRT' -and $_.FullName -notmatch '\\onecore\\' } | Sort-Object -Descending { [version]$_.VersionInfo.FileVersion } | Select-Object -First 1
          if (-not $hit) {
            $hit = $candidates | Where-Object { $_.FullName -match 'Microsoft\.VC143\.CRT' } | Sort-Object -Descending { [version]$_.VersionInfo.FileVersion } | Select-Object -First 1
          }
          if (-not $hit) {
            $hit = $candidates | Sort-Object -Descending { [version]$_.VersionInfo.FileVersion } | Select-Object -First 1
            Write-Warning "VS 2022 (VC143) MSVC CRT not found for arch $archDir; using newest available: $($hit.FullName)"
          }
          $crtDir = Split-Path $hit.FullName
          $crtVersion = (Get-Item (Join-Path $crtDir 'vcruntime140.dll')).VersionInfo.FileVersion
          Write-Host "Using MSVC CRT from: $crtDir (vcruntime140.dll $($crtVersion))"
          foreach ($dll in @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")) {
            $src = Join-Path $crtDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination release\\
            } else {
              Write-Warning "MSVC CRT $dll not found in $crtDir"
            }
          }

      - name: Copy license files to release directory
        run: |
          New-Item -ItemType Directory -Path release\\LICENSES
          "brotli", `
          "bzip2", `
          "double-conversion", `
          "fftw3", `
          "flac", `
          "freetype", `
          "getopt-win32", `
          "harfbuzz", `
          "icu", `
          "libpng", `
          "openssl", `
          "pcre2", `
          "qtbase", `
          "sqlite3", `
          "zlib", `
          "zstd" | ForEach-Object {
            $copyright = "build\\vcpkg_installed\\${{ matrix.vcpkg_triplet }}\\share\\$($_)\\copyright"
            if (Test-Path $copyright) {
              Copy-Item -Path $copyright -Destination release\\LICENSES\\copyright-$($_)
            }
          }
          if (Test-Path release\\LICENSES\\copyright-qtbase) {
            Rename-Item -Path release\\LICENSES\\copyright-qtbase -NewName copyright-qt6
          }
          if (Test-Path "$env:ONNXRUNTIME_ROOT\\LICENSE") {
            Copy-Item -Path "$env:ONNXRUNTIME_ROOT\\LICENSE" -Destination release\\LICENSES\\copyright-onnxruntime
          }

      - name: Copy scripts to release directory (if they exist)
        run: |
          if (Test-Path ".\\scripts\\Windows\\*.bat") {
            Copy-Item .\\scripts\\Windows\\*.bat -Destination release\\
          }

      - name: Download and copy FFmpeg to release directory
        if: matrix.bundle_external_tools == true
        run: |
          Invoke-WebRequest "${{ env.FFMPEG_URL }}" -OutFile ffmpeg.zip
          Expand-Archive .\\ffmpeg.zip -DestinationPath .
          Copy-Item -Path .\\${{ env.FFMPEG_PATH}}\\bin\\ffmpeg.exe -Destination release\\
          if (Test-Path .\\${{ env.FFMPEG_PATH}}\\bin\\ffprobe.exe) {
            Copy-Item -Path .\\${{ env.FFMPEG_PATH}}\\bin\\ffprobe.exe -Destination release\\
          }
          Copy-Item -Path .\\${{ env.FFMPEG_PATH}}\\bin\\*.dll -Destination release\\
          Copy-Item -Path .\\${{ env.FFMPEG_PATH}}\\LICENSE -Destination release\\LICENSES\\copyright-ffmpeg

      - name: Download and copy FLAC to release directory
        if: matrix.bundle_external_tools == true
        run: |
          Invoke-WebRequest "${{ env.FLAC_URL }}" -OutFile flac.zip
          Expand-Archive .\\flac.zip -DestinationPath .
          Copy-Item -Path .\\${{ env.FLAC_PATH }}\\Win64\\* -Destination release\\
          Copy-Item -Path .\\${{ env.FLAC_PATH }}\\COPYING.GPL -Destination release\\LICENSES\\copyright-flac

      - name: Build and copy vendored tbc-video-export to release directory
        if: matrix.bundle_external_tools == true
        run: |
          $exporterRoot = "${{ github.workspace }}\\src\\tbc-video-export"
          python -m pip install --upgrade pip
          python -m pip install -r "$exporterRoot\\pyinstaller\\requirements-build-windows.txt"
          python -c "import pywintypes, win32file, win32pipe"
          $env:PYTHONPATH = "$exporterRoot\\src"
          Push-Location $exporterRoot
          New-Item -ItemType Directory -Force -Path .\\build | Out-Null
          python .\\pyinstaller\\build_windows.py
          Pop-Location
          $builtExporter = "$exporterRoot\\dist\\tbc-video-export.exe"
          if (-not (Test-Path $builtExporter)) {
            throw "Vendored tbc-video-export build did not produce $builtExporter"
          }
          Copy-Item -Path $builtExporter -Destination release\\
          Copy-Item -Path "$exporterRoot\\LICENSE" -Destination release\\LICENSES\\copyright-tbc-video-export
          if ("${{ matrix.arch }}" -eq "x86_64") {
            Push-Location release
            .\\tbc-video-export.exe --dump-default-config
            Pop-Location
          } else {
            Write-Host "Skipping tbc-video-export --dump-default-config on arm64."
          }

      - name: Copy sqlite runtime to release directory
        run: |
          $sqliteDll = "build\\vcpkg_installed\\${{ matrix.vcpkg_triplet }}\\bin\\sqlite3.dll"
          if (-not (Test-Path $sqliteDll)) {
            throw "sqlite3.dll not found at $sqliteDll"
          }
          Copy-Item -Path $sqliteDll -Destination release\\

      - name: Copy project license
        run: Copy-Item -Path .\\LICENSE -Destination release\\LICENSES\\copyright-tbc-tools
      - name: Save vcpkg binary cache
        if: success() && steps.vcpkg-cache.outputs.cache-primary-key != '' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.VCPKG_BINARY_CACHE_ROOT }}\\${{ matrix.cache_subdir }}
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}
      - name: Commit updated dedicated cache repository (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        continue-on-error: true
        shell: pwsh
        run: |
          $cacheRepoPath = "${{ github.workspace }}\external-cache"
          $cacheToken = "${{ secrets.CI_CACHE_REPO_TOKEN }}"
          if ([string]::IsNullOrWhiteSpace($cacheToken)) {
            Write-Warning "CI_CACHE_REPO_TOKEN secret is not configured; skipping dedicated cache repository push."
            exit 0
          }
          git -C "$cacheRepoPath" config user.name "github-actions[bot]"
          git -C "$cacheRepoPath" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$cacheRepoPath" config http.version HTTP/1.1
          git -C "$cacheRepoPath" config http.postBuffer 524288000
          git -C "$cacheRepoPath" remote set-url origin "https://x-access-token:$cacheToken@github.com/${{ env.CACHE_REPOSITORY }}.git"
          git -C "$cacheRepoPath" add "vcpkg/${{ matrix.cache_subdir }}"
          git -C "$cacheRepoPath" diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No dedicated cache repository updates to commit."
            exit 0
          }
          git -C "$cacheRepoPath" commit -m "Update Windows vcpkg cache (${{ matrix.cache_subdir }}) [skip ci]" -m "Co-Authored-By: Oz <oz-agent@warp.dev>"
          $pushed = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            git -C "$cacheRepoPath" pull --rebase origin ${{ env.CACHE_REPOSITORY_REF }}
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Rebase attempt $attempt failed; retrying..."
              Start-Sleep -Seconds (10 * $attempt)
              continue
            }
            git -C "$cacheRepoPath" push origin HEAD:${{ env.CACHE_REPOSITORY_REF }}
            if ($LASTEXITCODE -eq 0) {
              $pushed = $true
              break
            }
            Write-Warning "Push attempt $attempt failed; retrying..."
            Start-Sleep -Seconds (10 * $attempt)
          }
          if (-not $pushed) {
            Write-Warning "Could not push cache update after retries."
            exit 0
          }

      - name: Verify required Windows runtime files are present
        run: |
          # Mirror the macOS enforcement (it fails the build if the platform plugin
          # is missing). Fail the Windows build if any runtime file the GUI tools need
          # to start on a clean machine is absent from the release directory.
          $required = @(
            "release\\qt.conf",
            "release\\platforms\\qwindows.dll",
            "release\\Qt6Core.dll",
            "release\\Qt6Gui.dll",
            "release\\Qt6Widgets.dll",
            "release\\FLAC.dll",
            "release\\ld-lds-converter.exe",
            "release\\ld-analyse.exe",
            "release\\tbc-video-export.exe",
            "release\\vcruntime140.dll",
            "release\\vcruntime140_1.dll",
            "release\\vendor\\vhs_decode_auto_audio_align\\VhsDecodeAutoAudioAlign.exe",
            "release\\vendor\\vhs_decode_auto_audio_align\\Binah.dll"
          )
          $missing = @()
          foreach ($f in $required) { if (-not (Test-Path $f)) { $missing += $f } }
          if ($missing.Count -gt 0) {
            $msg = "Missing required Windows runtime files (packaging incomplete):`n" + ($missing -join "`n")
            throw $msg
          }
          Write-Host "All required Windows runtime files present."

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release
          if-no-files-found: error
