name: "Build macOS tools"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string
      release_tag:
        description: "Release tag to use for bundle version metadata"
        required: false
        type: string
  release:
    types: [created]
permissions:
  contents: read
  actions: write

jobs:
  build-tbc-tools:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64

    name: Build tbc-tools (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
        env:
          NIX_FIRST_BUILD_UID: 401
          NIX_BUILD_USER_NAME_TEMPLATE: _nixbld_ci_%d
      - name: Restore and save Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ matrix.arch }}-
            nix-${{ runner.os }}-
          gc-max-store-size-macos: 8G

      - name: Build with Nix
        run: |
          nix build .#
          mkdir -p dist/bin
          if [ ! -f result/bin/ld-analyse.app/Contents/MacOS/.ld-analyse-wrapped ]; then
            echo "Missing wrapped GUI binary: result/bin/ld-analyse.app/Contents/MacOS/.ld-analyse-wrapped"
            exit 1
          fi
          
          # Copy wrapped GUI binary (avoid Nix wrapper with hardcoded paths)
          cp result/bin/ld-analyse.app/Contents/MacOS/.ld-analyse-wrapped dist/bin/ld-analyse
          chmod +x dist/bin/ld-analyse
          
          # Copy wrapped CLI tools (strip leading dot and -wrapped suffix)
          for wrapped in result/bin/.*-wrapped; do
            [ -f "$wrapped" ] || continue
            base="$(basename "$wrapped")"
            base="${base#.}"
            base="${base%-wrapped}"
            cp "$wrapped" "dist/bin/$base"
            chmod +x "dist/bin/$base"
          done
          # Bundle ffmpeg/ffprobe for self-contained exports
          FFMPEG_STORE="$(nix-store -q --references result 2>/dev/null | grep -E '/ffmpeg-[^/]+-bin$' | head -n 1 || true)"
          if [ -z "$FFMPEG_STORE" ]; then
            FFMPEG_STORE="$(nix build nixpkgs#ffmpeg.bin --no-link --print-out-paths 2>/dev/null | tail -n 1 || true)"
          fi
          if [ -z "$FFMPEG_STORE" ] || [ ! -x "$FFMPEG_STORE/bin/ffmpeg" ]; then
            echo "Missing ffmpeg from nixpkgs build"
            exit 1
          fi
          cp "$FFMPEG_STORE/bin/ffmpeg" dist/bin/ffmpeg
          chmod +x dist/bin/ffmpeg
          if [ -x "$FFMPEG_STORE/bin/ffprobe" ]; then
            cp "$FFMPEG_STORE/bin/ffprobe" dist/bin/ffprobe
            chmod +x dist/bin/ffprobe
          fi

      - name: Get version info
        id: version
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "version=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty)" >> $GITHUB_OUTPUT
          fi


      - name: Create app bundle structure
        run: |
          mkdir -p dist/tbc-tools.app/Contents/{Resources,MacOS,Frameworks,PlugIns}

          # Create Info.plist with dynamic version
          cat > dist/tbc-tools.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key>
              <string>TBC Tools</string>
              <key>CFBundleExecutable</key>
              <string>ld-analyse</string>
              <key>CFBundleIconFile</key>
              <string>tbc-tools.icns</string>
              <key>CFBundleIdentifier</key>
              <string>dev.domesday.tbc-tools</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>tbc-tools</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleVersion</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSRequiresAquaSystemAppearance</key>
              <false/>
          </dict>
          </plist>
          EOF

          # Copy binaries to MacOS folder
          cp -r dist/bin/* dist/tbc-tools.app/Contents/MacOS/
          
          # Copy scripts if they exist
          if [ -d "scripts" ]; then
            find scripts -maxdepth 1 -perm -111 -type f -exec cp {} dist/tbc-tools.app/Contents/MacOS/ \; 2>/dev/null || true
          fi

      - name: Verify app executable architecture
        run: |
          BIN="dist/tbc-tools.app/Contents/MacOS/ld-analyse"
          if [ ! -f "$BIN" ]; then
            echo "Expected app executable missing: $BIN"
            exit 1
          fi
          ARCHS="$(lipo -archs "$BIN" 2>/dev/null || true)"
          if [ -z "$ARCHS" ]; then
            echo "Unable to read binary architecture for $BIN"
            file "$BIN" || true
            exit 1
          fi
          case "${{ matrix.arch }}" in
            arm64)
              echo "$ARCHS" | grep -qw arm64 || { echo "Expected arm64 binary, got: $ARCHS"; exit 1; }
              ;;
            x86_64)
              echo "$ARCHS" | grep -qw x86_64 || { echo "Expected x86_64 binary, got: $ARCHS"; exit 1; }
              ;;
            *)
              echo "Unknown matrix.arch value: ${{ matrix.arch }}"
              exit 1
              ;;
          esac
          echo "Verified architecture: $ARCHS"
      - name: Bundle Python deps (numpy)
        run: |
          APP="dist/tbc-tools.app"
          PY_DIR="$APP/Contents/Resources/python"
          mkdir -p "$PY_DIR"
          PYTHON_BIN="/usr/bin/python3"
          if [ ! -x "$PYTHON_BIN" ]; then
            PYTHON_BIN="$(command -v python3 || true)"
          fi
          if [ -z "$PYTHON_BIN" ]; then
            echo "No python3 found for numpy install"
            exit 1
          fi
          "$PYTHON_BIN" -m pip install --target "$PY_DIR" numpy
          
          SCRIPT="$APP/Contents/MacOS/test-decode-pretbc"
          if [ -f "$SCRIPT" ] && [ ! -f "$SCRIPT.py" ]; then
            mv "$SCRIPT" "$SCRIPT.py"
            cat > "$SCRIPT" << 'EOF'
          #!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          PY_DIR="$DIR/../Resources/python"
          export PYTHONPATH="$PY_DIR${PYTHONPATH:+:$PYTHONPATH}"
          if [ -x /usr/bin/python3 ]; then
            PY="/usr/bin/python3"
          else
            PY="$(command -v python3)"
          fi
          exec "$PY" "$DIR/test-decode-pretbc.py" "$@"
          EOF
            chmod +x "$SCRIPT"
          fi

      - name: Create app icon
        run: |
          ICONSET_ROOT="$(mktemp -d)"
          ICONSET="$ICONSET_ROOT/ld-analyse.iconset"
          mkdir -p "$ICONSET"
          cp src/ld-analyse/Graphics/16-analyse.png "$ICONSET/icon_16x16.png"
          cp src/ld-analyse/Graphics/32-analyse.png "$ICONSET/icon_16x16@2x.png"
          cp src/ld-analyse/Graphics/32-analyse.png "$ICONSET/icon_32x32.png"
          cp src/ld-analyse/Graphics/64-analyse.png "$ICONSET/icon_32x32@2x.png"
          cp src/ld-analyse/Graphics/128-analyse.png "$ICONSET/icon_128x128.png"
          cp src/ld-analyse/Graphics/256-analyse.png "$ICONSET/icon_128x128@2x.png"
          cp src/ld-analyse/Graphics/256-analyse.png "$ICONSET/icon_256x256.png"
          if command -v sips >/dev/null 2>&1; then
            sips -z 512 512 src/ld-analyse/Graphics/256-analyse.png --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512 512 src/ld-analyse/Graphics/256-analyse.png --out "$ICONSET/icon_512x512.png"
            sips -z 1024 1024 src/ld-analyse/Graphics/256-analyse.png --out "$ICONSET/icon_512x512@2x.png"
          else
            cp src/ld-analyse/Graphics/256-analyse.png "$ICONSET/icon_256x256@2x.png"
            cp src/ld-analyse/Graphics/256-analyse.png "$ICONSET/icon_512x512.png"
          fi
          iconutil -c icns "$ICONSET" -o dist/tbc-tools.app/Contents/Resources/tbc-tools.icns

      - name: Bundle Qt plugins and qt.conf
        run: |
          mkdir -p dist/tbc-tools.app/Contents/PlugIns
          
          # Extract plugin paths from Nix wrapper and copy plugins
          PLUGIN_PATHS=$(strings -n 8 result/bin/ld-analyse.app/Contents/MacOS/ld-analyse | grep "/qt-6/plugins" | sort -u || true)
          if [ -z "$PLUGIN_PATHS" ]; then
            echo "No Qt plugin paths detected in Nix-built ld-analyse binary"
            exit 1
          fi
          while IFS= read -r p; do
            [ -n "$p" ] || continue
            if [ -d "$p" ]; then
              rsync -a "$p/" dist/tbc-tools.app/Contents/PlugIns/
            fi
          done <<< "$PLUGIN_PATHS"
          if [ ! -f dist/tbc-tools.app/Contents/PlugIns/platforms/libqcocoa.dylib ]; then
            echo "Missing required Qt platform plugin: dist/tbc-tools.app/Contents/PlugIns/platforms/libqcocoa.dylib"
            exit 1
          fi
          
          cat > dist/tbc-tools.app/Contents/Resources/qt.conf << 'EOF'
          [Paths]
          Plugins = PlugIns
          EOF

      - name: Bundle dependencies
        shell: bash
        run: |
          APP="dist/tbc-tools.app"
          FW_DIR="$APP/Contents/Frameworks"
          PLUGINS_DIR="$APP/Contents/PlugIns"

          mkdir -p "$FW_DIR" "$PLUGINS_DIR"
          chmod -R u+w "$APP/Contents" 2>/dev/null || true

          is_macho() {
            file "$1" 2>/dev/null | grep -q "Mach-O"
          }

          newref_for_dep() {
            local dep="$1"
            if [[ "$dep" == *".framework/"* ]]; then
              local framework_root
              framework_root=$(echo "$dep" | sed -E "s|(.*\\.framework)/.*|\\1|")
              local framework_name
              framework_name=$(basename "$framework_root")
              local version
              version=$(echo "$dep" | sed -E "s|.*\\.framework/Versions/([^/]+)/.*|\\1|")
              local bin_name
              bin_name=$(basename "$dep")
              echo "@rpath/$framework_name/Versions/$version/$bin_name"
            else
              local base
              base=$(basename "$dep")
              echo "@rpath/$base"
            fi
          }

          copy_dep() {
            local dep="$1"
            if [[ "$dep" == *".framework/"* ]]; then
              local framework_root
              framework_root=$(echo "$dep" | sed -E "s|(.*\\.framework)/.*|\\1|")
              local framework_name
              framework_name=$(basename "$framework_root")
              local version
              version=$(echo "$dep" | sed -E "s|.*\\.framework/Versions/([^/]+)/.*|\\1|")
              local bin_name
              bin_name=$(basename "$dep")
              local target="$FW_DIR/$framework_name/Versions/$version/$bin_name"

              if [ ! -f "$target" ]; then
                rsync -a "$framework_root" "$FW_DIR/"
                chmod -R u+w "$FW_DIR/$framework_name" || true
              fi

              install_name_tool -id "@rpath/$framework_name/Versions/$version/$bin_name" "$target" 2>/dev/null || true
              echo "$target"
            else
              local base
              base=$(basename "$dep")
              local target="$FW_DIR/$base"
              if [ ! -f "$target" ]; then
                cp "$dep" "$target" 2>/dev/null || true
                chmod u+w "$target" 2>/dev/null || true
              fi
              install_name_tool -id "@rpath/$base" "$target" 2>/dev/null || true
              echo "$target"
            fi
          }

          add_rpaths() {
            local file="$1"
            install_name_tool -add_rpath "@executable_path/../Frameworks" "$file" 2>/dev/null || true
            install_name_tool -add_rpath "@loader_path/../Frameworks" "$file" 2>/dev/null || true
            install_name_tool -add_rpath "@loader_path/../../Frameworks" "$file" 2>/dev/null || true
          }

          delete_nix_rpaths() {
            local file="$1"
            local rpaths
            rpaths=$(otool -l "$file" 2>/dev/null | awk '/LC_RPATH/{getline;getline;print $2}' || true)
            for rp in $rpaths; do
              if [[ "$rp" == /nix/store/* ]]; then
                install_name_tool -delete_rpath "$rp" "$file" 2>/dev/null || true
              fi
            done
          }

          process_file() {
            local file="$1"
            is_macho "$file" || return 0

            chmod u+w "$file" 2>/dev/null || true
            add_rpaths "$file"
            delete_nix_rpaths "$file"

            local deps
            deps=$(otool -L "$file" 2>/dev/null | tail -n +2 | awk "{print \$1}" || true)
            for dep in $deps; do
              case "$dep" in
                /nix/store/*|/usr/local/*|/opt/homebrew/*)
                  local target
                  target=$(copy_dep "$dep")
                  local newref
                  newref=$(newref_for_dep "$dep")
                  install_name_tool -change "$dep" "$newref" "$file" 2>/dev/null || true
                  [ -n "$target" ] && QUEUE+=("$target")
                  ;;
                *)
                  ;;
              esac
            done
          }

          QUEUE=()
          while IFS= read -r -d '' f; do QUEUE+=("$f"); done < <(find "$APP/Contents/MacOS" -type f -print0)
          while IFS= read -r -d '' f; do QUEUE+=("$f"); done < <(find "$FW_DIR" -type f -print0)
          if [ -d "$PLUGINS_DIR" ]; then
            while IFS= read -r -d '' f; do QUEUE+=("$f"); done < <(find "$PLUGINS_DIR" -type f -print0)
          fi

          SEEN_FILE=$(mktemp)
          while [ ${#QUEUE[@]} -gt 0 ]; do
            file="${QUEUE[0]}"
            QUEUE=("${QUEUE[@]:1}")
            if grep -Fxq "$file" "$SEEN_FILE"; then
              continue
            fi
            echo "$file" >> "$SEEN_FILE"
            process_file "$file"
          done
          rm -f "$SEEN_FILE"

          if [ -d "$FW_DIR" ]; then
            while IFS= read -r -d '' lib; do
              is_macho "$lib" || continue
              chmod u+w "$lib" 2>/dev/null || true
              rel="${lib#$FW_DIR/}"
              if [[ "$rel" == *.framework/* ]]; then
                install_name_tool -id "@rpath/$rel" "$lib" 2>/dev/null || true
              else
                install_name_tool -id "@rpath/$(basename "$lib")" "$lib" 2>/dev/null || true
              fi
            done < <(find "$FW_DIR" -type f -print0)
          fi

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi
      - name: Codesign app bundle (ad-hoc)
        run: |
          codesign --force --deep --sign - "dist/tbc-tools.app"

      - name: Verify app bundle
        run: |
          echo "App bundle contents:"
          find dist/tbc-tools.app -type f | head -20
          if [ ! -d "dist/tbc-tools.app/Contents/_CodeSignature" ]; then
            echo "Missing _CodeSignature after codesign"
            exit 1
          fi
          echo "\nMain executable dependencies:"
          otool -L dist/tbc-tools.app/Contents/MacOS/ld-analyse 2>/dev/null | head -10 || echo "Could not check dependencies"
          echo "\nMain executable rpaths:"
          otool -l dist/tbc-tools.app/Contents/MacOS/ld-analyse | grep -A2 LC_RPATH || true
          if ! otool -l dist/tbc-tools.app/Contents/MacOS/ld-analyse | grep -q LC_RPATH; then
            echo "No LC_RPATH entries found in ld-analyse"
            exit 1
          fi
          echo "\nScanning for /nix/store references:"
          FOUND=0
          while IFS= read -r -d '' f; do
            if file "$f" 2>/dev/null | grep -q "Mach-O"; then
              if otool -L "$f" 2>/dev/null | grep -q "/nix/store"; then
                echo "Nix load refs in: $f"
                FOUND=1
              fi
              if otool -l "$f" 2>/dev/null | grep -q "/nix/store"; then
                echo "Nix rpath refs in: $f"
                FOUND=1
              fi
            fi
          done < <(find dist/tbc-tools.app -type f -print0)
          if [ "$FOUND" -ne 0 ]; then
            echo "Found /nix/store references in app bundle"
            exit 1
          fi
      - name: Archive app bundle for universal merge
        run: |
          tar -C dist -czf "tbc-tools_${{ matrix.arch }}.app.tgz" tbc-tools.app

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal_tbc-tools_macos_${{ matrix.arch }}_app
          path: tbc-tools_${{ matrix.arch }}.app.tgz
          if-no-files-found: error
          retention-days: 1

      - name: Create DMG
        run: |
          create-dmg \
            --volname "TBC Tools ${{ steps.version.outputs.version }}" \
            --volicon "dist/tbc-tools.app/Contents/Resources/tbc-tools.icns" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "tbc-tools.app" 200 190 \
            --hide-extension "tbc-tools.app" \
            --app-drop-link 600 190 \
            --skip-jenkins \
            --format UDBZ \
            "tbc-tools_${{ matrix.arch }}.dmg" \
            "dist/tbc-tools.app"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbc-tools_macos_${{ matrix.arch }}
          path: tbc-tools_${{ matrix.arch }}.dmg
          if-no-files-found: error
  build-universal-macos:
    name: Build universal macOS app/dmg
    runs-on: macos-latest
    needs: build-tbc-tools
    steps:
      - name: Download arm64 app artifact
        uses: actions/download-artifact@v4
        with:
          name: internal_tbc-tools_macos_arm64_app
          path: universal/arm64-artifact

      - name: Download x86_64 app artifact
        uses: actions/download-artifact@v4
        with:
          name: internal_tbc-tools_macos_x86_64_app
          path: universal/x86_64-artifact

      - name: Extract app bundles
        shell: bash
        run: |
          mkdir -p universal/arm64 universal/x86_64
          tar -xzf universal/arm64-artifact/tbc-tools_arm64.app.tgz -C universal/arm64
          tar -xzf universal/x86_64-artifact/tbc-tools_x86_64.app.tgz -C universal/x86_64

      - name: Create universal app bundle
        shell: bash
        run: |
          APP_ARM="universal/arm64/tbc-tools.app"
          APP_X86="universal/x86_64/tbc-tools.app"
          APP_UNI="universal/tbc-tools.app"

          if [ ! -d "$APP_ARM" ] || [ ! -d "$APP_X86" ]; then
            echo "Missing input app bundles for universal merge"
            exit 1
          fi

          rsync -a "$APP_ARM/" "$APP_UNI/"

          is_macho() {
            file "$1" 2>/dev/null | grep -q "Mach-O"
          }

          while IFS= read -r -d '' arm_file; do
            rel="${arm_file#$APP_ARM/}"
            x86_file="$APP_X86/$rel"
            uni_file="$APP_UNI/$rel"

            if [ ! -f "$x86_file" ]; then
              continue
            fi

            if is_macho "$arm_file" && is_macho "$x86_file"; then
              tmp_file="${uni_file}.tmp"
              if ! lipo -create "$arm_file" "$x86_file" -output "$tmp_file"; then
                echo "Failed to create universal binary for: $rel"
                rm -f "$tmp_file"
                exit 1
              fi
              mv "$tmp_file" "$uni_file"
              chmod +x "$uni_file" 2>/dev/null || true
            fi
          done < <(find "$APP_ARM" -type f -print0)

          BIN="$APP_UNI/Contents/MacOS/ld-analyse"
          if [ ! -f "$BIN" ]; then
            echo "Missing merged main executable: $BIN"
            exit 1
          fi
          ARCHS="$(lipo -archs "$BIN" 2>/dev/null || true)"
          echo "Universal executable archs: $ARCHS"
          echo "$ARCHS" | grep -qw arm64 || { echo "arm64 arch missing in universal binary"; exit 1; }
          echo "$ARCHS" | grep -qw x86_64 || { echo "x86_64 arch missing in universal binary"; exit 1; }

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - name: Codesign universal app bundle (ad-hoc)
        run: |
          codesign --force --deep --sign - "universal/tbc-tools.app"

      - name: Create universal DMG
        run: |
          create-dmg \
            --volname "TBC Tools Universal" \
            --volicon "universal/tbc-tools.app/Contents/Resources/tbc-tools.icns" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "tbc-tools.app" 200 190 \
            --hide-extension "tbc-tools.app" \
            --app-drop-link 600 190 \
            --skip-jenkins \
            --format UDBZ \
            "tbc-tools_universal.dmg" \
            "universal/tbc-tools.app"


      - name: Upload universal DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tbc-tools_macos_universal
          path: tbc-tools_universal.dmg
          if-no-files-found: error

      - name: Remove internal app transfer artifacts
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}"
          IDS="$(
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/actions/runs/${{ github.run_id }}/artifacts?per_page=100" \
            | jq -r '.artifacts[] | select(.name | test("^internal_tbc-tools_macos_(arm64|x86_64)_app$")) | .id'
          )"
          if [ -z "$IDS" ]; then
            echo "No internal artifacts found to remove."
            exit 0
          fi
          for id in $IDS; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/actions/artifacts/$id" >/dev/null
            echo "Deleted internal app transfer artifact id=$id"
          done
