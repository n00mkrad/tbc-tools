name: "Build Linux tools"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  APPIMAGE_FILE: "linuxdeploy-x86_64.AppImage"
  APPIMAGE_URL: "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
  APPIMAGE_PLUGIN_FILE: "linuxdeploy-plugin-appimage-x86_64.AppImage"
  APPIMAGE_PLUGIN_URL: "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
  APPIMAGE_QT_FILE: "linuxdeploy-plugin-qt-x86_64.AppImage"
  APPIMAGE_QT_URL: "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
  DNF_CACHE_VERSION: "v1"

jobs:
  build-tbc-tools:
    name: Build tbc-tools (x86_64)
    runs-on: ubuntu-latest
    container:
      image: oraclelinux:8
      options: --user 0 --cap-add SYS_ADMIN --cap-add MKNOD --device /dev/fuse:mrw --security-opt apparmor:unconfined --privileged

    steps:
      - name: Set up DNF download cache
        id: dnf-cache
        uses: actions/cache@v5
        with:
          path: /var/cache/dnf
          key: dnfcache-${{ runner.os }}-${{ runner.arch }}-${{ env.DNF_CACHE_VERSION }}
          restore-keys: |
            dnfcache-${{ runner.os }}-${{ runner.arch }}-
            dnfcache-${{ runner.os }}-
            dnfcache-
          
      - name: Setup environment
        run: |
          dnf install --assumeyes --nogpgcheck https://dl.fedoraproject.org/pub/epel/epel-release-latest-$(rpm -E %rhel).noarch.rpm
          dnf install --assumeyes --nogpgcheck https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-$(rpm -E %rhel).noarch.rpm https://mirrors.rpmfusion.org/nonfree/el/rpmfusion-nonfree-release-$(rpm -E %rhel).noarch.rpm
          FORCE_DNF=1 /usr/bin/crb enable
          dnf clean metadata
          dnf makecache --refresh
          dnf --assumeyes --refresh install sudo git file xz ca-certificates patchelf libglvnd-opengl libglvnd-glx libglvnd-egl fftw-devel ffmpeg-devel ffmpeg pkgconf-pkg-config make cmake gcc-c++ python3
          update-ca-trust
          mkdir -p -m 0755 /nix
          chown root /nix
          groupadd --system nixbld || true
          for i in $(seq 1 32); do
            useradd --system --gid nixbld --groups nixbld --no-create-home --home-dir /var/empty --shell /sbin/nologin "nixbld$i" || true
          done

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Nix
        shell: bash
        run: |
          curl -L https://nixos.org/nix/install | sh -s -- --no-daemon --yes
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
          echo "/root/.nix-profile/bin" >> "$GITHUB_PATH"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          {
            echo "NIX_CONFIG<<EOF"
            echo "experimental-features = nix-command flakes"
            echo "access-tokens = github.com=${{ github.token }}"
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "NIX_PATH=nixpkgs=channel:nixos-unstable" >> "$GITHUB_ENV"
          echo "NIX_SSL_CERT_FILE=/etc/pki/tls/certs/ca-bundle.crt" >> "$GITHUB_ENV"
      - name: Restore and save Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-x86_64-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-x86_64-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - name: Create release directory
        run: mkdir release/

      - name: Build with Nix
        run: |
          export HOME=/root
          export PATH="/nix/var/nix/profiles/default/bin:/root/.nix-profile/bin:$HOME/.nix-profile/bin:$PATH"
          chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"
          nix build .#
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share
          SKIP_LIB_REGEX='^(libc\.so\.6|libm\.so\.6|libpthread\.so\.0|libdl\.so\.2|librt\.so\.1|libresolv\.so\.2|ld-linux-.*\.so\..*|libnss_.*|libutil\.so\..*|libanl\.so\..*)$'
          for wrapped in result/bin/.*-wrapped; do
            [ -f "$wrapped" ] || continue
            base="$(basename "$wrapped")"
            base="${base#.}"
            base="${base%-wrapped}"
            cp -a "$wrapped" "AppDir/usr/bin/$base"
          done
          for item in result/bin/*; do
            [ -e "$item" ] || continue
            base="$(basename "$item")"
            [ -e "AppDir/usr/bin/$base" ] && continue
            cp -a "$item" "AppDir/usr/bin/$base"
          done
          nix build nixpkgs#ffmpeg --out-link ffmpeg-result
          FFMPEG_BIN=""
          FFPROBE_BIN=""
          for ffout in ffmpeg-result ffmpeg-result-*; do
            [ -d "$ffout/bin" ] || continue
            [ -z "$FFMPEG_BIN" ] && [ -f "$ffout/bin/ffmpeg" ] && FFMPEG_BIN="$ffout/bin/ffmpeg"
            [ -z "$FFPROBE_BIN" ] && [ -f "$ffout/bin/ffprobe" ] && FFPROBE_BIN="$ffout/bin/ffprobe"
          done
          if [ -z "$FFMPEG_BIN" ] || [ -z "$FFPROBE_BIN" ]; then
            echo "Failed to locate ffmpeg/ffprobe under ffmpeg-result outputs"
            ls -la ffmpeg-result* || true
            exit 1
          fi
          cp -a "$FFMPEG_BIN" AppDir/usr/bin/ffmpeg
          cp -a "$FFPROBE_BIN" AppDir/usr/bin/ffprobe
          chmod -R u+w AppDir/usr/bin
          normalize_bin_script_shebangs() {
            local bin_dir="$1"
            for candidate in "$bin_dir"/*; do
              [ -f "$candidate" ] || continue
              [ -x "$candidate" ] || continue
              local first_line
              first_line="$(head -n 1 "$candidate" 2>/dev/null || true)"
              case "$first_line" in
                '#!/nix/store/'*'/bin/bash'|'#!/nix/store/'*'/bin/sh')
                  sed -i '1s@^#!.*@#!/usr/bin/env bash@' "$candidate"
                  ;;
              esac
            done
          }
          normalize_bin_script_shebangs AppDir/usr/bin
          PATCH_ELF_BIN="$(command -v patchelf || true)"
          if [ -z "$PATCH_ELF_BIN" ]; then
            nix build nixpkgs#patchelf --out-link patchelf-result
            PATCH_ELF_BIN="patchelf-result/bin/patchelf"
          fi
          if [ ! -x "$PATCH_ELF_BIN" ]; then
            echo "Failed to locate patchelf for interpreter normalization"
            exit 1
          fi
          if [ -d result/lib ]; then
            cp -a result/lib/. AppDir/usr/lib/
          fi
          if [ -d result/share ]; then
            cp -a result/share/. AppDir/usr/share/
          fi
          chmod -R u+w AppDir/usr/lib
          LIBSTDCPP_PATH="$(ldd result/bin/.ld-analyse-wrapped | awk '$1 == "libstdc++.so.6" { print $3; exit }')"
          LIBGCC_PATH="$(ldd result/bin/.ld-analyse-wrapped | awk '$1 == "libgcc_s.so.1" { print $3; exit }')"
          [ -n "$LIBSTDCPP_PATH" ] && cp -L "$LIBSTDCPP_PATH" AppDir/usr/lib/libstdc++.so.6
          [ -n "$LIBGCC_PATH" ] && cp -L "$LIBGCC_PATH" AppDir/usr/lib/libgcc_s.so.1
          gather_loader_and_glibc_deps() {
            local source_elf="$1"
            [ -f "$source_elf" ] || return 0
            local interp
            interp="$("$PATCH_ELF_BIN" --print-interpreter "$source_elf" 2>/dev/null || true)"
            if [ -n "$interp" ] && [ -f "$interp" ]; then
              cp -Lf "$interp" "AppDir/usr/lib/$(basename "$interp")"
            fi
            for glibc_dep in $(ldd "$source_elf" 2>/dev/null | awk '/=> \/nix\/store/ { print $3 }' | grep -E '/(glibc|glibc-multi|gcc[^/]*)/' || true); do
              [ -f "$glibc_dep" ] || continue
              base="$(basename "$glibc_dep")"
              cp -Lf "$glibc_dep" "AppDir/usr/lib/$base"
            done
          }
          copy_glibc_runtime_from_interpreter() {
            local source_elf="$1"
            local interp
            local interp_dir
            interp="$("$PATCH_ELF_BIN" --print-interpreter "$source_elf" 2>/dev/null || true)"
            [ -n "$interp" ] || return 0
            interp_dir="$(dirname "$interp")"
            for glibc_name in libc.so.6 libm.so.6 libpthread.so.0 libdl.so.2 librt.so.1 libutil.so.1 libanl.so.1 libresolv.so.2; do
              [ -f "$interp_dir/$glibc_name" ] && cp -Lf "$interp_dir/$glibc_name" "AppDir/usr/lib/$glibc_name"
            done
          }
          gather_loader_and_glibc_deps result/bin/.ld-analyse-wrapped
          gather_loader_and_glibc_deps AppDir/usr/bin/ld-analyse
          copy_glibc_runtime_from_interpreter result/bin/.ld-analyse-wrapped
          pending=1
          while [ "$pending" -eq 1 ]; do
            pending=0
            for elf in AppDir/usr/bin/* AppDir/usr/lib/*; do
              [ -f "$elf" ] || continue
              for dep in $(ldd "$elf" 2>/dev/null | awk '/=> \/nix\/store/ { print $3 }'); do
                [ -f "$dep" ] || continue
                base="$(basename "$dep")"
                if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
                  continue
                fi
                dest="AppDir/usr/lib/$base"
                if [ ! -e "$dest" ]; then
                  cp -L "$dep" "$dest"
                  pending=1
                fi
              done
            done
          done
          PATCH_ELF_BIN="$(command -v patchelf || true)"
          if [ -z "$PATCH_ELF_BIN" ]; then
            nix build nixpkgs#patchelf --out-link patchelf-result
            PATCH_ELF_BIN="patchelf-result/bin/patchelf"
          fi
          if [ ! -x "$PATCH_ELF_BIN" ]; then
            echo "Failed to locate patchelf for RPATH normalization"
            exit 1
          fi
          for elf in AppDir/usr/bin/* AppDir/usr/lib/*.so* AppDir/usr/plugins/*/*.so; do
            [ -f "$elf" ] || continue
            base="$(basename "$elf")"
            if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
              continue
            fi
            if ! "$PATCH_ELF_BIN" --print-rpath "$elf" >/dev/null 2>&1; then
              continue
            fi
            "$PATCH_ELF_BIN" --set-rpath '$ORIGIN:$ORIGIN/../lib:$ORIGIN/../../lib' "$elf"
          done

      - name: Download linuxdeploy and build AppImage
        run: |
          curl -LJO ${{ env.APPIMAGE_URL }}
          curl -LJO ${{ env.APPIMAGE_PLUGIN_URL }}
          curl -LJO ${{ env.APPIMAGE_QT_URL }}
          curl -L -o appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage

          chmod +x ${{ env.APPIMAGE_FILE }} ${{ env.APPIMAGE_PLUGIN_FILE }} ${{ env.APPIMAGE_QT_FILE }} appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          SKIP_LIB_REGEX='^(libc\.so\.6|libm\.so\.6|libpthread\.so\.0|libdl\.so\.2|librt\.so\.1|libresolv\.so\.2|ld-linux-.*\.so\..*|libnss_.*|libutil\.so\..*|libanl\.so\..*)$'
          QMAKE="$(find /nix/store -type f -path '*/bin/qmake' | sort | head -n 1 || true)"
          if [ -z "$QMAKE" ]; then
            QMAKE="$(find /nix/store -type f -path '*/bin/qmake6' | sort | head -n 1 || true)"
          fi
          if [ -n "$QMAKE" ]; then
            export QMAKE
            export PATH="$(dirname "$QMAKE"):$PATH"
          fi

          if ! EXTRA_QT_MODULES="core;gui;opengl;widgets;sql" ./${{ env.APPIMAGE_QT_FILE }} --appdir AppDir; then
            echo "linuxdeploy-plugin-qt failed; using manual Qt plugin fallback."
          fi

          # Bundle required Qt runtime plugins explicitly (handles Nix Qt layouts where
          # linuxdeploy-plugin-qt cannot find some plugins, e.g. qtsvg split packages).
          copy_qt_plugin() {
            plugin_rel="$1"
            plugin_src="$(find /nix/store -path "*/plugins/${plugin_rel}" | sort | head -n 1 || true)"
            if [ -z "$plugin_src" ]; then
              echo "Required Qt plugin missing from Nix store: ${plugin_rel}"
              exit 1
            fi
            mkdir -p "AppDir/usr/plugins/$(dirname "$plugin_rel")"
            cp -L "$plugin_src" "AppDir/usr/plugins/${plugin_rel}"
            echo "Bundled Qt plugin: ${plugin_rel} <- ${plugin_src}"
          }
          copy_qt_plugin "platforms/libqxcb.so"
          copy_qt_plugin "platforminputcontexts/libcomposeplatforminputcontextplugin.so"
          copy_qt_plugin "xcbglintegrations/libqxcb-glx-integration.so"
          copy_qt_plugin "sqldrivers/libqsqlite.so"

          copy_qt_plugin "iconengines/libqsvgicon.so"
          copy_qt_plugin "imageformats/libqsvg.so"
          copy_runtime_lib() {
            local lib_name="$1"
            local lib_src
            lib_src="$(find /nix/store -name "$lib_name" | sort | head -n 1 || true)"
            if [ -z "$lib_src" ]; then
              echo "Required runtime lib missing from Nix store: $lib_name"
              exit 1
            fi
            cp -Lf "$lib_src" "AppDir/usr/lib/$lib_name"
            echo "Bundled runtime lib: $lib_name <- $lib_src"
          }
          for runtime_lib in \
            libxcb-cursor.so.0 \
            libxcb-icccm.so.4 \
            libxcb-image.so.0 \
            libxcb-keysyms.so.1 \
            libxcb-render-util.so.0 \
            libxkbcommon.so.0 \
            libxkbcommon-x11.so.0; do
            copy_runtime_lib "$runtime_lib"
          done
          cat > AppDir/usr/bin/qt.conf <<'EOF'
          [Paths]
          Plugins = ../plugins
          EOF
          pending=1
          while [ "$pending" -eq 1 ]; do
            pending=0
            for elf in AppDir/usr/plugins/*/*.so AppDir/usr/lib/*.so*; do
              [ -f "$elf" ] || continue
              for dep in $(ldd "$elf" 2>/dev/null | awk '/=> \// { print $3 }'); do
                [ -f "$dep" ] || continue
                base="$(basename "$dep")"
                if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
                  continue
                fi
                dest="AppDir/usr/lib/$base"
                if [ ! -e "$dest" ]; then
                  cp -L "$dep" "$dest"
                  pending=1
                fi
              done
            done
          done
          chmod -R u+w AppDir/usr/bin AppDir/usr/lib AppDir/usr/plugins
          PATCH_ELF_BIN="$(command -v patchelf || true)"
          if [ -z "$PATCH_ELF_BIN" ]; then
            nix build nixpkgs#patchelf --out-link patchelf-result
            PATCH_ELF_BIN="patchelf-result/bin/patchelf"
          fi
          if [ ! -x "$PATCH_ELF_BIN" ]; then
            echo "Failed to locate patchelf for RPATH normalization"
            exit 1
          fi
          for elf in AppDir/usr/bin/* AppDir/usr/lib/*.so* AppDir/usr/plugins/*/*.so; do
            [ -f "$elf" ] || continue
            base="$(basename "$elf")"
            if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
              continue
            fi
            if ! "$PATCH_ELF_BIN" --print-rpath "$elf" >/dev/null 2>&1; then
              continue
            fi
            "$PATCH_ELF_BIN" --set-rpath '$ORIGIN:$ORIGIN/../lib:$ORIGIN/../../lib' "$elf"
          done
          wrap_elf_tools_with_loader() {
            local bin_dir="$1"
            local loader_name="$2"
            for exe in "$bin_dir"/*; do
              [ -f "$exe" ] || continue
              [ -x "$exe" ] || continue
              if ! head -c 4 "$exe" 2>/dev/null | grep -q $'\177ELF'; then
                continue
              fi
              local name
              local real
              name="$(basename "$exe")"
              real="$bin_dir/.${name}.real"
              mv "$exe" "$real"
              cat > "$exe" <<EOF
          #!/bin/bash
          set -e
          SELF_DIR="\$(cd "\$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
          ROOT_DIR="\$(cd "\${SELF_DIR}/.." && pwd)"
          LOADER="\${ROOT_DIR}/lib/${loader_name}"
          TARGET="\${SELF_DIR}/.${name}.real"
          exec "\$LOADER" --library-path "\${ROOT_DIR}/lib" "\$TARGET" "\$@"
          EOF
              chmod +x "$exe"
            done
          }
          wrap_elf_tools_with_loader AppDir/usr/bin ld-linux-x86-64.so.2

          # Some copied Nix store files are read-only; make bundle writable so linuxdeploy
          # can strip binaries/libs in non-root environments.
          chmod -R u+w AppDir/usr/bin AppDir/usr/lib AppDir/usr/plugins
          # Keep loader/glibc binaries intact; stripping these can break startup.
          export NO_STRIP=1
          cat > AppDir/AppRun <<'EOF'
          #!/bin/bash
          set -e
          APPDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          LOADER=""
          case "$(uname -m)" in
            x86_64) LOADER="$APPDIR/usr/lib/ld-linux-x86-64.so.2" ;;
            aarch64|arm64) LOADER="$APPDIR/usr/lib/ld-linux-aarch64.so.1" ;;
          esac
          if [ ! -x "$LOADER" ]; then
            echo "Missing bundled dynamic loader: $LOADER"
            exit 1
          fi
          export PATH="$APPDIR/usr/bin:${PATH}"
          export QT_PLUGIN_PATH="$APPDIR/usr/plugins${QT_PLUGIN_PATH:+:$QT_PLUGIN_PATH}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$APPDIR/usr/plugins/platforms"
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          unset LD_LIBRARY_PATH
          run_target() {
            local target="$1"
            shift
            if head -c 4 "$target" 2>/dev/null | grep -q $'\177ELF'; then
              exec "$LOADER" --library-path "$APPDIR/usr/lib" "$target" "$@"
            fi
            exec "$target" "$@"
          }
          if [ "$#" -gt 0 ] && [ -x "$APPDIR/usr/bin/$1" ]; then
            cmd="$1"
            shift
            if [ "$cmd" = "ld-analyse" ]; then
              run_target "$APPDIR/usr/bin/$cmd" --force-dark-theme "$@"
            fi
            run_target "$APPDIR/usr/bin/$cmd" "$@"
          fi
          run_target "$APPDIR/usr/bin/ld-analyse" --force-dark-theme "$@"
          EOF
          chmod +x AppDir/AppRun
          # Create minimal desktop file
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/tbc-tools.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=TBC Tools
          Comment=Time Base Corrected video analysis tools
          Exec=ld-analyse
          Icon=tbc-tools
          Categories=AudioVideo;Video;
          EOF
          # Provide application icon for desktop entry
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src/ld-analyse/Graphics/256-analyse.png AppDir/usr/share/icons/hicolor/256x256/apps/tbc-tools.png
          ln -sf usr/share/applications/tbc-tools.desktop AppDir/tbc-tools.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/tbc-tools.png AppDir/tbc-tools.png
          ln -sf tbc-tools.png AppDir/.DirIcon

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir release/tbc-tools-x86_64.AppImage
      - name: Validate x86_64 AppImage bundle
        run: |
          PYTHON_RUNTIME="$(nix build nixpkgs#python311 --no-link --print-out-paths | tail -n 1)"
          export PATH="$PYTHON_RUNTIME/bin:$PATH"
          bash ci/verify_linux_bundle.sh x86-appimage release/tbc-tools-x86_64.AppImage

      - name: Copy scripts
        run: find scripts -maxdepth 1 -type f -executable -exec cp {} release/ \; || true

      - name: Create release archive
        run: tar -cvJSf tbc-tools_linux_x86_64.tar.xz --transform s/release/tbc-tools/ release/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: tbc-tools_linux_x86_64
          path: tbc-tools_linux_x86_64.tar.xz
          if-no-files-found: error
  build-tbc-tools-arm64:
    name: Build tbc-tools (arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: true
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Configure Nix authenticated GitHub fetches
        run: |
          {
            echo "NIX_CONFIG<<EOF"
            echo "experimental-features = nix-command flakes"
            echo "access-tokens = github.com=${{ github.token }}"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - name: Restore and save Nix store cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-arm64-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-arm64-
            nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G

      - name: Create release directory
        run: mkdir -p release/bin release/lib release/plugins release/share

      - name: Build with Nix
        run: |
          nix build .#
          SKIP_LIB_REGEX='^(libc\.so\.6|libm\.so\.6|libpthread\.so\.0|libdl\.so\.2|librt\.so\.1|libresolv\.so\.2|ld-linux-.*\.so\..*|libnss_.*|libutil\.so\..*|libanl\.so\..*)$'
          for wrapped in result/bin/.*-wrapped; do
            [ -f "$wrapped" ] || continue
            base="$(basename "$wrapped")"
            base="${base#.}"
            base="${base%-wrapped}"
            cp -a "$wrapped" "release/bin/$base"
          done
          for item in result/bin/*; do
            [ -e "$item" ] || continue
            base="$(basename "$item")"
            [ -e "release/bin/$base" ] && continue
            cp -a "$item" "release/bin/$base"
          done
          nix build nixpkgs#ffmpeg --out-link ffmpeg-result
          FFMPEG_BIN=""
          FFPROBE_BIN=""
          for ffout in ffmpeg-result ffmpeg-result-*; do
            [ -d "$ffout/bin" ] || continue
            [ -z "$FFMPEG_BIN" ] && [ -f "$ffout/bin/ffmpeg" ] && FFMPEG_BIN="$ffout/bin/ffmpeg"
            [ -z "$FFPROBE_BIN" ] && [ -f "$ffout/bin/ffprobe" ] && FFPROBE_BIN="$ffout/bin/ffprobe"
          done
          if [ -z "$FFMPEG_BIN" ] || [ -z "$FFPROBE_BIN" ]; then
            echo "Failed to locate ffmpeg/ffprobe under ffmpeg-result outputs"
            ls -la ffmpeg-result* || true
            exit 1
          fi
          cp -a "$FFMPEG_BIN" release/bin/ffmpeg
          cp -a "$FFPROBE_BIN" release/bin/ffprobe
          chmod -R u+w release/bin
          normalize_bin_script_shebangs() {
            local bin_dir="$1"
            for candidate in "$bin_dir"/*; do
              [ -f "$candidate" ] || continue
              [ -x "$candidate" ] || continue
              local first_line
              first_line="$(head -n 1 "$candidate" 2>/dev/null || true)"
              case "$first_line" in
                '#!/nix/store/'*'/bin/bash'|'#!/nix/store/'*'/bin/sh')
                  sed -i '1s@^#!.*@#!/usr/bin/env bash@' "$candidate"
                  ;;
              esac
            done
          }
          normalize_bin_script_shebangs release/bin
          PATCH_ELF_BIN="$(command -v patchelf || true)"
          if [ -z "$PATCH_ELF_BIN" ]; then
            nix build nixpkgs#patchelf --out-link patchelf-result
            PATCH_ELF_BIN="patchelf-result/bin/patchelf"
          fi
          if [ ! -x "$PATCH_ELF_BIN" ]; then
            echo "Failed to locate patchelf for interpreter normalization"
            exit 1
          fi
          if [ -d result/lib ]; then
            cp -a result/lib/. release/lib/
          fi
          if [ -d result/share ]; then
            cp -a result/share/. release/share/
          fi
          chmod -R u+w release/lib
          LIBSTDCPP_PATH="$(ldd result/bin/.ld-analyse-wrapped | awk '$1 == "libstdc++.so.6" { print $3; exit }')"
          LIBGCC_PATH="$(ldd result/bin/.ld-analyse-wrapped | awk '$1 == "libgcc_s.so.1" { print $3; exit }')"
          [ -n "$LIBSTDCPP_PATH" ] && cp -L "$LIBSTDCPP_PATH" release/lib/libstdc++.so.6
          [ -n "$LIBGCC_PATH" ] && cp -L "$LIBGCC_PATH" release/lib/libgcc_s.so.1
          gather_loader_and_glibc_deps() {
            local source_elf="$1"
            [ -f "$source_elf" ] || return 0
            local interp
            interp="$("$PATCH_ELF_BIN" --print-interpreter "$source_elf" 2>/dev/null || true)"
            if [ -n "$interp" ] && [ -f "$interp" ]; then
              cp -Lf "$interp" "release/lib/$(basename "$interp")"
            fi
            for glibc_dep in $(ldd "$source_elf" 2>/dev/null | awk '/=> \/nix\/store/ { print $3 }' | grep -E '/(glibc|glibc-multi|gcc[^/]*)/' || true); do
              [ -f "$glibc_dep" ] || continue
              base="$(basename "$glibc_dep")"
              cp -Lf "$glibc_dep" "release/lib/$base"
            done
          }
          copy_glibc_runtime_from_interpreter() {
            local source_elf="$1"
            local interp
            local interp_dir
            interp="$("$PATCH_ELF_BIN" --print-interpreter "$source_elf" 2>/dev/null || true)"
            [ -n "$interp" ] || return 0
            interp_dir="$(dirname "$interp")"
            for glibc_name in libc.so.6 libm.so.6 libpthread.so.0 libdl.so.2 librt.so.1 libutil.so.1 libanl.so.1 libresolv.so.2; do
              [ -f "$interp_dir/$glibc_name" ] && cp -Lf "$interp_dir/$glibc_name" "release/lib/$glibc_name"
            done
          }
          gather_loader_and_glibc_deps result/bin/.ld-analyse-wrapped
          gather_loader_and_glibc_deps release/bin/ld-analyse
          copy_glibc_runtime_from_interpreter result/bin/.ld-analyse-wrapped
          pending=1
          while [ "$pending" -eq 1 ]; do
            pending=0
            for elf in release/bin/* release/lib/*; do
              [ -f "$elf" ] || continue
              for dep in $(ldd "$elf" 2>/dev/null | awk '/=> \/nix\/store/ { print $3 }'); do
                [ -f "$dep" ] || continue
                base="$(basename "$dep")"
                if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
                  continue
                fi
                dest="release/lib/$base"
                if [ ! -e "$dest" ]; then
                  cp -L "$dep" "$dest"
                  pending=1
                fi
              done
            done
          done

          # Bundle required Qt runtime plugins explicitly for portable GUI operation.
          copy_qt_plugin() {
            plugin_rel="$1"
            plugin_src="$(find /nix/store -path "*/plugins/${plugin_rel}" | sort | head -n 1 || true)"
            if [ -z "$plugin_src" ]; then
              echo "Required Qt plugin missing from Nix store: ${plugin_rel}"
              exit 1
            fi
            mkdir -p "release/plugins/$(dirname "$plugin_rel")"
            cp -L "$plugin_src" "release/plugins/${plugin_rel}"
            echo "Bundled Qt plugin: ${plugin_rel} <- ${plugin_src}"
          }

          copy_qt_plugin "platforms/libqxcb.so"
          copy_qt_plugin "platforminputcontexts/libcomposeplatforminputcontextplugin.so"
          copy_qt_plugin "xcbglintegrations/libqxcb-glx-integration.so"
          copy_qt_plugin "sqldrivers/libqsqlite.so"
          copy_qt_plugin "iconengines/libqsvgicon.so"
          copy_qt_plugin "imageformats/libqsvg.so"
          copy_runtime_lib() {
            local lib_name="$1"
            local lib_src
            lib_src="$(find /nix/store -name "$lib_name" | sort | head -n 1 || true)"
            if [ -z "$lib_src" ]; then
              echo "Required runtime lib missing from Nix store: $lib_name"
              exit 1
            fi
            cp -Lf "$lib_src" "release/lib/$lib_name"
            echo "Bundled runtime lib: $lib_name <- $lib_src"
          }
          for runtime_lib in \
            libxcb-cursor.so.0 \
            libxcb-icccm.so.4 \
            libxcb-image.so.0 \
            libxcb-keysyms.so.1 \
            libxcb-render-util.so.0 \
            libxkbcommon.so.0 \
            libxkbcommon-x11.so.0; do
            copy_runtime_lib "$runtime_lib"
          done
          cat > release/bin/qt.conf <<'EOF'
          [Paths]
          Plugins = ../plugins
          EOF

          pending=1
          while [ "$pending" -eq 1 ]; do
            pending=0
            for elf in release/plugins/*/*.so release/lib/*.so*; do
              [ -f "$elf" ] || continue
              for dep in $(ldd "$elf" 2>/dev/null | awk '/=> \// { print $3 }'); do
                [ -f "$dep" ] || continue
                base="$(basename "$dep")"
                if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
                  continue
                fi
                dest="release/lib/$base"
                if [ ! -e "$dest" ]; then
                  cp -L "$dep" "$dest"
                  pending=1
                fi
              done
            done
          done

          chmod -R u+w release/bin release/lib release/plugins

          PATCH_ELF_BIN="$(command -v patchelf || true)"
          if [ -z "$PATCH_ELF_BIN" ]; then
            nix build nixpkgs#patchelf --out-link patchelf-result
            PATCH_ELF_BIN="patchelf-result/bin/patchelf"
          fi
          if [ ! -x "$PATCH_ELF_BIN" ]; then
            echo "Failed to locate patchelf for RPATH normalization"
            exit 1
          fi
          for elf in release/bin/* release/lib/*.so* release/plugins/*/*.so; do
            [ -f "$elf" ] || continue
            base="$(basename "$elf")"
            if echo "$base" | grep -Eq "$SKIP_LIB_REGEX"; then
              continue
            fi
            if ! "$PATCH_ELF_BIN" --print-rpath "$elf" >/dev/null 2>&1; then
              continue
            fi
            "$PATCH_ELF_BIN" --set-rpath '$ORIGIN:$ORIGIN/../lib:$ORIGIN/../../lib' "$elf"
          done
          wrap_elf_tools_with_loader() {
            local bin_dir="$1"
            local loader_name="$2"
            for exe in "$bin_dir"/*; do
              [ -f "$exe" ] || continue
              [ -x "$exe" ] || continue
              if ! head -c 4 "$exe" 2>/dev/null | grep -q $'\177ELF'; then
                continue
              fi
              local name
              local real
              name="$(basename "$exe")"
              real="$bin_dir/.${name}.real"
              mv "$exe" "$real"
              cat > "$exe" <<EOF
          #!/bin/bash
          set -e
          SELF_DIR="\$(cd "\$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
          ROOT_DIR="\$(cd "\${SELF_DIR}/.." && pwd)"
          LOADER="\${ROOT_DIR}/lib/${loader_name}"
          TARGET="\${SELF_DIR}/.${name}.real"
          exec "\$LOADER" --library-path "\${ROOT_DIR}/lib" "\$TARGET" "\$@"
          EOF
              chmod +x "$exe"
            done
          }
          wrap_elf_tools_with_loader release/bin ld-linux-aarch64.so.1
          cat > release/tbc-tools-run <<'EOF'
          #!/bin/bash
          set -e
          SELF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          LOADER=""
          case "$(uname -m)" in
            x86_64) LOADER="$SELF_DIR/lib/ld-linux-x86-64.so.2" ;;
            aarch64|arm64) LOADER="$SELF_DIR/lib/ld-linux-aarch64.so.1" ;;
          esac
          if [ ! -x "$LOADER" ]; then
            echo "Missing bundled dynamic loader: $LOADER"
            exit 1
          fi
          export PATH="$SELF_DIR/bin:${PATH}"
          export QT_PLUGIN_PATH="$SELF_DIR/plugins${QT_PLUGIN_PATH:+:$QT_PLUGIN_PATH}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$SELF_DIR/plugins/platforms"
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          unset LD_LIBRARY_PATH
          run_target() {
            local target="$1"
            shift
            if head -c 4 "$target" 2>/dev/null | grep -q $'\177ELF'; then
              exec "$LOADER" --library-path "$SELF_DIR/lib" "$target" "$@"
            fi
            exec "$target" "$@"
          }
          if [ "$#" -gt 0 ] && [ -x "$SELF_DIR/bin/$1" ]; then
            cmd="$1"
            shift
            if [ "$cmd" = "ld-analyse" ]; then
              run_target "$SELF_DIR/bin/$cmd" --force-dark-theme "$@"
            fi
            run_target "$SELF_DIR/bin/$cmd" "$@"
          fi
          run_target "$SELF_DIR/bin/ld-analyse" --force-dark-theme "$@"
          EOF
          chmod +x release/tbc-tools-run

      - name: Validate arm64 release bundle
        run: bash ci/verify_linux_bundle.sh arm64-release release

      - name: Copy scripts
        run: find scripts -maxdepth 1 -type f -executable -exec cp {} release/ \; || true

      - name: Create release archive
        run: tar -cvJf tbc-tools_linux_arm64.tar.xz --transform s/release/tbc-tools/ release/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: tbc-tools_linux_arm64
          path: tbc-tools_linux_arm64.tar.xz
          if-no-files-found: error
